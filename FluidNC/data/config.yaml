name: Zanvara Mini (Polar)
board: None

kinematics:
  Cartesian:

stepping:
  engine: Timed
  pulse_us: 10

axes:
  x:
    steps_per_mm: 50.000
    max_rate_mm_per_min: 2000
    acceleration_mm_per_sec2: 100
    max_travel_mm: 360.000
    motor0:
      stepstick:
        step_pin: gpio.26
        direction_pin: gpio.27
  y:
    steps_per_mm: 63.690
    max_rate_mm_per_min: 1000
    acceleration_mm_per_sec2: 50
    max_travel_mm: 125.000
    motor0:
      stepstick:
        step_pin: gpio.33
        direction_pin: gpio.32

spi:
  miso_pin: gpio.19
  mosi_pin: gpio.23
  sck_pin: gpio.18

sdcard:
  cs_pin: gpio.5
  frequency_hz: 4000000

rgbled:
  pin: gpio.13
  index: 52
  idle: 007F00
  alarm: 7F0000
  homing: 501F00
  cycle: 7F4422
  hold: 777744
  jog: 007F3F
  sleep: 001F00
  configAlarm: 7F0000